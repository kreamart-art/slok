server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # SPA: val terug op index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # 3D-modellen en assets mogen lang gecachet worden
    location ~* \.(glb|gltf|fbx|png|jpg|jpeg|woff2?)$ {
        expires 30d;
        access_log off;
        add_header Cache-Control "public, max-age=2592000";
    }

    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;
}
